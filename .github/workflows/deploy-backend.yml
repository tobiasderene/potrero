name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

env:
  PROJECT_ID: potrero-novillo
  REGION: southamerica-east1
  SERVICE: potrero-backend
  REGISTRY: southamerica-east1-docker.pkg.dev/potrero-novillo/potrero/backend

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Autenticar en Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configurar Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Crear repositorio Artifact Registry si no existe
        run: |
          gcloud artifacts repositories create potrero \
            --repository-format=docker \
            --location=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} 2>/dev/null || true

      - name: Configurar Docker para Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build y push imagen
        working-directory: backend
        run: |
          docker build \
            -t ${{ env.REGISTRY }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}:latest \
            .
          docker push ${{ env.REGISTRY }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}:latest

      - name: Limpiar secret refs de deploy anterior
        run: |
          gcloud run services update ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --remove-secrets "DATABASE_URL,SUPABASE_JWT_SECRET" \
            --project ${{ env.PROJECT_ID }} 2>/dev/null || true

      - name: Deploy a Cloud Run
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
        run: |
          python3 - << 'PYEOF'
          import yaml, os
          env = {
            'ENVIRONMENT': 'production',
            'CORS_ORIGINS': '["https://potrero-novillo.web.app","https://potrero-novillo.firebaseapp.com"]',
            'DATABASE_URL': os.environ['DATABASE_URL'],
            'SUPABASE_JWT_SECRET': os.environ['SUPABASE_JWT_SECRET'],
          }
          with open('/tmp/env.yaml', 'w') as f:
              yaml.dump(env, f)
          PYEOF

          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.REGISTRY }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --env-vars-file /tmp/env.yaml \
            --min-instances 0 \
            --max-instances 3 \
            --memory 512Mi \
            --cpu 1 \
            --concurrency 100 \
            --timeout 30 \
            --project ${{ env.PROJECT_ID }}
